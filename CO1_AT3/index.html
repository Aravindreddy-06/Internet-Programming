<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Development Standards Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }
    nav {
      background: #222;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 24px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #4caf50;
    }
    video {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    form {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #43a047;
    }
  </style>
</head>
<body>

  <!-- 3. Semantic navigation -->
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/register">Register</a></li>
    </ul>
  </nav>

  <h1>Promotional Video</h1>

<!-- 1. Video embedding -->
<video src="promotionvideo.mp4" controls width="640" height="360">
  Your browser does not support the video tag.
</video>

  <h1>Registration Form</h1>

  <!-- 2. Form using POST for secure data submission -->
  <form action="/register" method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Register</button>
  </form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>CSS Animation Example</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f2f2f2;
        }

        h2{
            color: navy;
        }

        .box{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative;
            margin: 50px auto;
            animation: moveBox 4s infinite;
        }

        @keyframes moveBox{
            0%{
                left: 0px;
                background-color: blue;
            }

            50%{
                left: 200px;
                background-color: red;
            }

            100%{
                left: 0px;
                background-color: green;
            }
        }
    </style>
</head>

<body>

    <h2>CSS Animation Example</h2>

    <div class="box"></div>

</body>
</html>
